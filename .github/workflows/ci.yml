name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          python-version: "3.13"
      - run: uv sync --group ml
        env:
          UV_PROJECT_ENVIRONMENT: .venv
      - run: uv run poe quality

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          python-version: "3.13"
      - run: uv sync --group ml
        env:
          UV_PROJECT_ENVIRONMENT: .venv
      - run: uv run poe test-cov-core
      - uses: codecov/codecov-action@v6
        with:
          flags: dataenginex
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
