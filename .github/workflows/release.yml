name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.4.1)"
        required: true
        type: string
      ref:
        description: "Git ref to build from (branch or SHA)"
        required: false
        default: "main"
        type: string

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "latest"
          python-version: "3.13"
      - run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ vars.PYPI_ENVIRONMENT }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: GitHub Release + SBOM
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "latest"
      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -m 1 "^version = " pyproject.toml | sed 's/version = "//;s/".*//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Generate CycloneDX SBOM
        run: |
          uvx --from cyclonedx-bom cyclonedx-py environment \
            -o sbom-dex-${{ steps.version.outputs.version }}.json \
            --of json
      - name: Create GitHub release + attach SBOM
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          gh release create "$RELEASE_TAG" \
            --title "DEX $RELEASE_TAG" \
            --generate-notes \
            "sbom-dex-${{ steps.version.outputs.version }}.json"
