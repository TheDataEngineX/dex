# DEX Release Post-Processing
# Triggered when release-please creates a GitHub Release (release:published).
# Generates a CycloneDX SBOM and attaches it to the release.
# PyPI publishing is handled by pypi-publish.yml (also triggers on release:published).

name: Release DEX

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach SBOM to (e.g., v0.8.7)"
        required: false
        type: string

permissions:
  contents: write

env:
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

jobs:
  release-dex:
    name: Attach SBOM to Release
    runs-on: ubuntu-latest

    steps:
      - name: Notify Release Start
        uses: actions/github-script@v8
        if: always()
        with:
          script: |
            if (!process.env.SLACK_WEBHOOK) return;
            try {
              await fetch(process.env.SLACK_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  text: '💎 DEX Release Post-Processing Started',
                  blocks: [{
                    type: 'section',
                    text: {
                      type: 'mrkdwn',
                      text: `*💎 DEX Release Post-Processing*\n*Tag:* ${process.env.TAG}\n*Generating SBOM...*`
                    }
                  }]
                })
              });
            } catch (e) { console.log('Slack notification failed'); }
        env:
          SLACK_WEBHOOK: ${{ env.SLACK_WEBHOOK }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep -m 1 "^version = " pyproject.toml | sed 's/version = "//;s/".*//')
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version in pyproject.toml: $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate CycloneDX SBOM
        run: |
          uvx --from cyclonedx-bom cyclonedx-py environment \
            -o sbom-dex-${{ steps.version.outputs.version }}.json \
            --of json
          echo "SBOM generated: sbom-dex-${{ steps.version.outputs.version }}.json"

      - name: Attach SBOM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${{ github.event.release.tag_name || inputs.tag }}"
          gh release upload "$RELEASE_TAG" \
            "sbom-dex-${{ steps.version.outputs.version }}.json" \
            --clobber

      - name: Notify Release Success
        if: success()
        uses: actions/github-script@v8
        with:
          script: |
            if (!process.env.SLACK_WEBHOOK) return;
            try {
              await fetch(process.env.SLACK_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  text: '✅ DEX Release Ready',
                  blocks: [{
                    type: 'section',
                    text: {
                      type: 'mrkdwn',
                      text: `*✅ DEX Release Ready*\n*Version:* ${process.env.VERSION}\n*SBOM attached*\n*Release:* <${process.env.URL}|View Release>`
                    }
                  }]
                })
              });
            } catch (e) { console.log('Slack notification failed:', e.message); }
        env:
          SLACK_WEBHOOK: ${{ env.SLACK_WEBHOOK }}
          VERSION: ${{ steps.version.outputs.version }}
          URL: ${{ github.event.release.html_url }}

      - name: Notify Release Failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            if (!process.env.SLACK_WEBHOOK) return;
            try {
              await fetch(process.env.SLACK_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  text: '❌ DEX Release Post-Processing Failed',
                  blocks: [
                    {
                      type: 'section',
                      text: { type: 'mrkdwn', text: `*❌ DEX Release Post-Processing Failed*` }
                    },
                    {
                      type: 'section',
                      fields: [
                        { type: 'mrkdwn', text: `*Tag:*\n${process.env.TAG}` },
                        { type: 'mrkdwn', text: `*Commit:*\n\`${process.env.SHA?.substring(0, 8)}\`` },
                        { type: 'mrkdwn', text: `*Run:*\n<${process.env.URL}|View Details>` }
                      ]
                    }
                  ]
                })
              });
            } catch (e) { console.log('Slack notification failed:', e.message); }
        env:
          SLACK_WEBHOOK: ${{ env.SLACK_WEBHOOK }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
          SHA: ${{ github.sha }}
          URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
