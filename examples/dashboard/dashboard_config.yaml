# DataEngineX Dashboard Configuration
# See: packages/dataenginex/src/dataenginex/dashboard/app.py

title: "DataEngineX Pipeline Monitor"

# DEX API endpoint (for /health, /metrics, /api/v1/*)
dex_api_url: "http://localhost:8000"

# Prometheus server for raw metrics queries
prometheus_url: "http://localhost:9090"

# Auto-refresh interval in seconds (minimum 5)
refresh_interval_seconds: 30

# Panels to display (order matters)
panels:
  - pipeline_status
  - quality_scores
  - model_drift
  - alerts
