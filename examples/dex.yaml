project:
  name: demo-project
  version: "0.1.0"
  description: Full-stack DataEngineX demo

data:
  engine: duckdb
  sources:
    raw_users:
      type: csv
      path: examples/data/users.csv
    raw_events:
      type: csv
      path: examples/data/events.csv

  pipelines:
    clean_users:
      source: raw_users
      transforms:
        - type: filter
          condition: "age > 0"
        - type: deduplicate
          key: [email]
      quality:
        completeness: 0.95
        uniqueness: [email]
      destination: silver_users

    user_events:
      source: raw_events
      depends_on: [clean_users]
      transforms:
        - type: sql
          sql: "SELECT user_id, COUNT(*) as event_count FROM _data GROUP BY user_id"
      destination: gold_user_events

ml:
  tracker: builtin
  experiments:
    churn_model:
      model_type: sklearn
      target: churned
      features: [age, event_count, tenure_days]
      params:
        n_estimators: 100
        max_depth: 5
  drift:
    monitor: [age, event_count]
    method: psi
    threshold: 0.2

ai:
  llm:
    provider: ollama
    model: ${LLM_MODEL:-qwen3:8b}
  retrieval:
    strategy: hybrid
    top_k: 10
    reranker: true
  vectorstore:
    backend: builtin
    embedding_model: all-MiniLM-L6-v2
  collections:
    docs:
      chunk_size: 512
      chunk_overlap: 50
  agents:
    assistant:
      system_prompt: "You are a helpful data engineering assistant."
      tools: [query, pipeline_status]
      max_iterations: 10

server:
  host: "0.0.0.0"
  port: 17000
  auth:
    enabled: false

observability:
  metrics: true
  tracing: false
  log_level: INFO
