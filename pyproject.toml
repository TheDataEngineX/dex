[project]
name = "dataenginex"
version = "0.6.0"
description = "DataEngineX - Core framework for data engineering projects"
authors = [
    {name = "Jay", email = "jayapal.myaka99@gmail.com"}
]
readme = "src/dataenginex/README.md"
requires-python = ">=3.12"
license = {file = "LICENSE"}
dependencies = [
    "pydantic>=2.0.0",
    "python-dotenv>=1.2.0",
    "pyyaml>=6.0.2",
    "loguru>=0.7.3",
    "httpx>=0.28.0",
    "prometheus-client>=0.24.0",
    # API framework
    "fastapi>=0.128.4",
    "uvicorn>=0.40.0",
    "structlog>=25.5.0",
    "python-json-logger>=4.0.0",
    "opentelemetry-api>=1.39.0",
    "opentelemetry-sdk>=1.39.0",
    "opentelemetry-instrumentation-fastapi>=0.60b1",
    "opentelemetry-exporter-otlp>=1.39.0",
    "email-validator>=2.0.0",
    # Cloud storage
    "boto3>=1.35.0",
    "google-cloud-storage>=2.18.0",
    "google-cloud-bigquery>=3.30.0",
    # Data formats
    "pyarrow>=18.0.0",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-cov>=7.0.0",
    "pytest-asyncio>=1.3.0",
    "ruff>=0.15.0",
    "mypy>=1.19.0",
    "types-pyyaml>=6.0.12.20250822",
    "types-requests>=2.32.4.20260107",
    "poethepoet>=0.40.0",
    "uv>=0.10.0",
    "zensical>=0.0.24",
    "mkdocs-material>=9.6.0",
    "mkdocstrings[python]>=0.28.0",
    "pre-commit>=4.5.1",
]
data = [
    "pyspark>=4.1.1",
    "databricks-cli",
    "apache-airflow>=2.8.0",
    "requests>=2.32.0",
]
notebook = [
    "ipykernel>=7.2.0",
    "numpy>=2.4",
    "pandas>=3.0",
]
ml = [
    "scikit-learn>=1.6.0",
    "xgboost>=3.0.0",
    "numpy>=2.4",
    "sentence-transformers>=2.0.0",
]
dashboard = [
    "streamlit>=1.40.0",
]

[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dataenginex"]

[tool.uv]
python-preference = "only-managed"
default-groups = ["dev"]
conflicts = [
    [
        { group = "dashboard" },
        { group = "notebook" },
    ],
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM", "C90"]

[tool.ruff.lint.mccabe]
max-complexity = 8

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_configs = true
disallow_any_generics = true
disallow_subclassing_any = true
warn_return_any = true
warn_unreachable = true
no_implicit_optional = true

[[tool.mypy.overrides]]
module = ["structlog.*", "loguru.*", "prometheus_client.*", "opentelemetry.*", "streamlit.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["boto3.*", "google.auth.*", "google.cloud.*", "pyarrow.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["dataenginex.lakehouse.storage"]
warn_unused_ignores = false  # pre-commit installs google-cloud-storage (ignore used), CI does not (ignore unused)

[[tool.mypy.overrides]]
module = ["dataenginex.ml.training"]
warn_unused_ignores = false  # sklearn may be installed (import-untyped) or not (import-not-found) depending on env

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
pythonpath = ["src"]
filterwarnings = [
    "error",                                          # Treat all warnings as errors by default
    "ignore::DeprecationWarning:websockets\\.legacy",  # uvicorn uses deprecated websockets.legacy API
    "ignore::DeprecationWarning:uvicorn\\.protocols",  # uvicorn imports deprecated WebSocketServerProtocol
]

[tool.coverage.run]
branch = true
source = ["dataenginex"]
omit = [
    "*/src/dataenginex/api/routers/ml.py",
    "*/src/dataenginex/dashboard/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = true
