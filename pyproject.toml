[project]
name = "dataenginex"
version = "0.9.12"
description = "DataEngineX - Core framework for AI/ML/Data engineering projects"
authors = [
    {name = "Jay", email = "jayapal.myaka99@gmail.com"}
]
readme = "src/dataenginex/README.md"
requires-python = ">=3.13"
license = {file = "LICENSE"}
dependencies = [
    "pydantic>=2.10.0",
    "python-dotenv>=1.2.1",
    "pyyaml>=6.0.3",
    "click>=8.3.1",
    "rich>=14.3.3",
    "duckdb>=1.5.0",
    "croniter>=6.0.0",
    "httpx>=0.28.0",
    "prometheus-client>=0.24.1",
    # API framework
    "fastapi>=0.135.1",
    "uvicorn>=0.42.0",
    "structlog>=25.5.0",
    "python-json-logger>=4.0.0",
    "opentelemetry-api>=1.40.0",
    "opentelemetry-sdk>=1.40.0",
    "opentelemetry-instrumentation-fastapi>=0.61b0",
    "opentelemetry-exporter-otlp>=1.40.0",
    "email-validator>=2.3.0",
    # Data formats
    "pyarrow>=23.0.1",
]

[project.scripts]
dex = "dataenginex.cli.main:dex"

[project.optional-dependencies]
cloud = [
    "boto3>=1.42.0",
    "google-cloud-storage>=3.0.0",
    "google-cloud-bigquery>=3.40.0",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-cov>=7.0.0",
    "pytest-asyncio>=1.3.0",
    "ruff>=0.15.6",
    "mypy>=1.19.1",
    "types-pyyaml>=6.0.12.20250915",
    "types-requests>=2.32.4.20260107",
    "poethepoet>=0.42.1",
    "uv>=0.10.0",
    "mkdocs-material>=9.7.0",
    "mkdocstrings[python]>=0.29.0",
    "pre-commit>=4.5.1",
    "pip-audit>=2.10.0",
]
data = [
    "pyspark>=4.1.1",
    "databricks-cli>=0.18.0",
    "apache-airflow>=2.8.0,<4.0.0",
    "requests>=2.32.0",
]
notebook = [
    "ipykernel>=7.2.0",
    "numpy>=2.4",
    "pandas>=3.0",
]
ml = [
    "scikit-learn>=1.8.0",
    "xgboost>=3.2.0",
    "numpy>=2.4",
    "sentence-transformers>=5.3.0",
]
# mlflow is in its own group — it pins pandas<3 which conflicts with notebook>=3.0
# Install with: uv sync --group ml --group tracking
tracking = [
    "mlflow>=3.0",
]
dashboard = [
    "streamlit>=1.55.0",
]

[build-system]
requires = ["hatchling>=1.29.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dataenginex"]

[tool.uv]
python-preference = "only-managed"
default-groups = ["dev"]
conflicts = [
    [
        { group = "dashboard" },
        { group = "notebook" },
    ],
    # mlflow requires pandas<3; notebook requires pandas>=3.0
    [
        { group = "tracking" },
        { group = "notebook" },
    ],
]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM", "C90"]

[tool.ruff.lint.mccabe]
max-complexity = 8

[tool.mypy]
python_version = "3.13"
strict = true
warn_unused_configs = true
disallow_any_generics = true
disallow_subclassing_any = true
warn_return_any = true
warn_unreachable = true
no_implicit_optional = true

[[tool.mypy.overrides]]
module = ["structlog.*", "prometheus_client.*", "opentelemetry.*", "streamlit.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["boto3.*", "google.auth.*", "google.cloud.*", "google.api_core.*", "pyarrow.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["mlflow.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["sentence_transformers.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["dataenginex.ml.vectorstore"]
warn_unused_ignores = false  # sentence-transformers optional: ignore used in CI, unused when installed

[[tool.mypy.overrides]]
module = ["dataenginex.lakehouse.storage"]
warn_unused_ignores = false  # pre-commit installs google-cloud-storage (ignore used), CI does not (ignore unused)

[[tool.mypy.overrides]]
module = ["dataenginex.ml.training"]
warn_unused_ignores = false  # sklearn may be installed (import-untyped) or not (import-not-found) depending on env

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
pythonpath = ["src"]
filterwarnings = [
    "error",                                          # Treat all warnings as errors by default
    "ignore::DeprecationWarning:websockets\\.legacy",  # uvicorn uses deprecated websockets.legacy API
    "ignore::DeprecationWarning:uvicorn\\.protocols",  # uvicorn imports deprecated WebSocketServerProtocol
]

[tool.coverage.run]
branch = true
source = ["dataenginex"]
omit = [
    "*/src/dataenginex/dashboard/*",
    # Requires a live MLflow server — not available in CI (same as S3/GCS integration tests)
    "*/src/dataenginex/ml/mlflow_registry.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = true
