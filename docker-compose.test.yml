# ---------------------------------------------------------------
# DEX — Storage Emulators for Integration Tests
#
# Spins up LocalStack (S3) and fake-gcs-server (GCS) for local
# integration testing without real cloud accounts.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   uv run pytest tests/integration/test_storage_real.py -v
#   docker compose -f docker-compose.test.yml down
#
# Ports:
#   LocalStack (S3):     4566
#   fake-gcs-server:     4443
# ---------------------------------------------------------------
services:

  # --- LocalStack — S3 emulation ---
  localstack:
    image: localstack/localstack:4.0
    container_name: dex-localstack
    ports:
      - "4566:4566"           # Gateway / S3 endpoint
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
      - EAGER_SERVICE_LOADING=1
      # Create the test bucket on startup
      - LOCALSTACK_INIT_SCRIPTS_PATH=/etc/localstack/init/ready.d
    volumes:
      - ./infra/localstack:/etc/localstack/init/ready.d:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # --- fake-gcs-server — GCS emulation ---
  fake-gcs-server:
    image: fsouza/fake-gcs-server:1.49
    container_name: dex-fake-gcs
    ports:
      - "4443:4443"           # HTTP API endpoint
    command:
      - "-scheme=http"
      - "-port=4443"
      - "-external-url=http://localhost:4443"
      - "-backend=memory"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4443/storage/v1/b"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
